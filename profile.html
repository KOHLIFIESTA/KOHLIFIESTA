
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Inter, Arial, sans-serif;
  background:url('https://images3.alphacoders.com/139/1395361.png') center/cover no-repeat fixed;
  min-height:100vh;
  color:#f7f7f7;
}
.overlay{
  background:rgba(0,0,0,0.78);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}
.card{
  width:min(520px,100%);
  background:rgba(15,15,15,0.94);
  border:1px solid rgba(255,208,0,0.28);
  border-radius:28px;
  padding:36px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.avatar{
  width:130px;
  height:130px;
  border-radius:50%;
  border:4px solid #ffd000;
  margin-bottom:18px;
}
h1{
  color:#ffd000;
  font-size:2.2rem;
  margin-bottom:6px;
}
.subtitle{
  color:#d4c477;
  margin-bottom:24px;
}
.stat-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin:16px 0 24px;
  padding:18px 22px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
}
.stat-row span{
  display:block;
  font-size:0.95rem;
  color:#e6e0c1;
}
.stat-row strong{
  color:#ffffff;
  font-size:1.3rem;
}
input,
button{
  width:100%;
  outline:none;
  border:none;
  border-radius:16px;
  font-size:1rem;
}
input{
  padding:16px 18px;
  margin:12px 0 8px;
  background:rgba(255,255,255,0.08);
  color:#fff;
}
input::placeholder{
  color:rgba(255,255,255,0.6);
}
.button-row{
  display:grid;
  gap:14px;
  margin-top:16px;
}
button{
  padding:16px;
  font-weight:700;
  cursor:pointer;
  transition:transform .25s ease, background .25s ease;
}
button.primary{
  background:linear-gradient(135deg,#ffd000,#ffb700);
  color:#111;
}
button.secondary{
  background:rgba(255,255,255,0.08);
  color:#f7f7f7;
  border:1px solid rgba(255,255,255,0.12);
}
button:hover{
  transform:translateY(-2px);
}
.message{
  margin-top:18px;
  min-height:24px;
  color:#d4f5d4;
  font-weight:600;
}
.message.error{
  color:#ffbb99;
}
.link-text{
  display:inline-block;
  margin-top:22px;
  color:#ffd000;
  text-decoration:none;
  font-weight:700;
}
</style>
</head>
<body>
<div class="overlay">
  <div class="card">
    <img class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="User avatar">
    <h1 id="profileName">Discord Username</h1>
    <div class="subtitle" id="profileStatus">Link your game account to earn 250 bonus points.</div>

    <div class="stat-row">
      <div>
        <span>Points Balance</span>
        <strong id="pointsValue">0</strong>
      </div>
      <div>
        <span>Game Account</span>
        <strong id="gameAccountValue">Not linked</strong>
      </div>
    </div>

    <input id="gameNameInput" type="text" placeholder="Enter Game Username">
    <div class="button-row">
      <button id="linkGameButton" class="primary">🎮 Link Game Account</button>
      <button id="earnPointsButton" class="secondary">💰 Earn More Points</button>
      <button id="homeButton" class="secondary">🏠 Back to Home</button>
    </div>

    <div class="message" id="statusMessage"></div>
  </div>
</div>
<script>
  async function fetchSession() {
    try {
      const response = await fetch('/api/session');
      if (!response.ok) throw new Error('Unable to load session');
      return await response.json();
    } catch (error) {
      return { authenticated: false };
    }
  }

  function updateProfile(user) {
    document.getElementById('profileName').textContent = user.username || 'Discord Username';
    document.getElementById('pointsValue').textContent = user.points || 0;
    document.getElementById('gameAccountValue').textContent = user.gameAccount || 'Not linked';
    document.getElementById('profileStatus').textContent = user.gameAccount
      ? 'Game account linked successfully. Enjoy your bonus points!' 
      : 'Link your game account to receive 250 bonus points.';
    const alreadyLinked = Boolean(user.gameAccount);
    document.getElementById('gameNameInput').disabled = alreadyLinked;
    document.getElementById('linkGameButton').textContent = alreadyLinked ? '✅ Account Linked' : '🎮 Link Game Account';
    document.getElementById('linkGameButton').classList.toggle('primary', !alreadyLinked);
    document.getElementById('linkGameButton').classList.toggle('secondary', alreadyLinked);
  }

  function showMessage(message, type = 'success') {
    const el = document.getElementById('statusMessage');
    el.textContent = message;
    el.className = type === 'error' ? 'message error' : 'message';
  }

  async function linkGameAccount() {
    const input = document.getElementById('gameNameInput');
    const gameName = input.value.trim();
    if (!gameName) {
      showMessage('Please enter your game username before linking.', 'error');
      return;
    }

    try {
      const response = await fetch('/api/link-game', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ gameName })
      });
      const result = await response.json();
      if (!response.ok) throw new Error(result.error || 'Unable to link account');
      updateProfile({ username: document.getElementById('profileName').textContent, points: result.points, gameAccount: result.gameAccount });
      showMessage(`Success! ${result.gameAccount} is linked and you received ${result.points} points.`);
    } catch (error) {
      showMessage(error.message || 'Link failed.', 'error');
    }
  }

  document.getElementById('earnPointsButton').addEventListener('click', () => {
    window.location.href = 'points.html';
  });
  document.getElementById('homeButton').addEventListener('click', () => {
    window.location.href = 'index.html';
  });
  document.getElementById('linkGameButton').addEventListener('click', linkGameAccount);

  window.addEventListener('DOMContentLoaded', async () => {
    const session = await fetchSession();
    if (!session.authenticated) {
      document.getElementById('profileStatus').textContent = 'Please sign in with Discord to manage your profile.';
      document.getElementById('linkGameButton').disabled = true;
      return;
    }
    updateProfile(session.user);
  });
</script>
</body>
</html>
